name: docker-publish

on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  publish:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout exact tested commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize image namespace (lowercase)
        run: |
          set -euo pipefail
          echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.OWNER_LC }}/resume-service-hr
          tags: |
            type=sha
            type=raw,value=main,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Set image ref for verification
        run: |
          echo "IMAGE=ghcr.io/${{ env.OWNER_LC }}/resume-service-hr:sha-${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_ENV"

      - name: Check fixture exists
        run: |
          set -euo pipefail
          ls -l tests/fixtures/ci_sample.pdf

      - name: Run container
        run: |
          set -euo pipefail
          docker rm -f resume-service-hr-ci >/dev/null 2>&1 || true
          docker run -d --name resume-service-hr-ci -p 0:8000 \
            -e DEBUG_MODE=false \
            -e MOCK_HR_PROCESSOR=true \
            -e VLLM_URL=http://example.invalid \
            -e VLLM_MODEL=dummy \
            "$IMAGE"
          
          PORT="$(docker port resume-service-hr-ci 8000/tcp | python3 -c "import sys; s=sys.stdin.read().strip(); print(s.rsplit(':', 1)[-1])")"
          test -n "$PORT"
          echo "PORT=$PORT" >> "$GITHUB_ENV"

      - name: Wait for health
        run: |
          set -euo pipefail
          for i in $(seq 1 60); do
            if curl -fsS "http://localhost:${PORT}/health" >/dev/null; then
              echo "healthy"
              exit 0
            fi
            sleep 2
          done
          echo "health check timed out"
          docker logs resume-service-hr-ci || true
          exit 1

      - name: Verify HTTP endpoints
        run: |
          set -euo pipefail

          curl -fsS "http://localhost:${PORT}/health" \
            | python -c "import sys, json; d=json.load(sys.stdin); assert d['status']=='healthy'"

          curl -fsS -X POST "http://localhost:${PORT}/test_resume/" \
            -F "file=@tests/fixtures/ci_sample.pdf;type=application/pdf" \
            | python -c "import sys, json; d=json.load(sys.stdin); assert d.get('status')=='ok'"

      - name: Show logs on failure
        if: failure()
        run: |
          docker logs resume-service-hr-ci || true

      - name: Cleanup container
        if: always()
        run: |
          docker rm -f resume-service-hr-ci || true